<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | POS System</title>

  <!-- Bootstrap 5 CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <!-- Google Fonts -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      margin: 0;
      padding: 0;
      background: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── FULL PAGE WRAPPER ── */
    .login-page {
      display: flex;
      width: 100vw;
      min-height: 100vh;
      position: relative;
    }

    /* ── LEFT PANEL (Blue) ── */
    .login-left {
      width: 42%;
      background: #2563EB;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 48px;
      position: relative;
      border-radius: 0 80px 80px 0;
      z-index: 2;
    }

    .brand-block {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }

    .brand-icon {
      width: 52px;
      height: 52px;
      background: rgba(255,255,255,.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #fff;
      flex-shrink: 0;
    }

    .brand-text-name {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      line-height: 1.1;
    }

    .brand-text-role {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,.65);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .welcome-heading {
      font-size: 38px;
      font-weight: 800;
      color: #fff;
      text-align: center;
      line-height: 1.2;
      margin-bottom: 24px;
    }

    /* Login back button on left panel */
    .btn-back-login {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 22px;
      border: 1.5px solid rgba(255,255,255,.6);
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: transparent;
      cursor: pointer;
      text-decoration: none;
      transition: background .2s, border-color .2s;
    }

    .btn-back-login:hover {
      background: rgba(255,255,255,.15);
      border-color: #fff;
      color: #fff;
    }

    /* ── RIGHT PANEL (White) ── */
    .login-right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      background: #fff;
    }

    /* ── RESET CARD ── */
    .login-card {
      width: 100%;
      max-width: 360px;
      border: 1px solid #E2E8F0;
      border-radius: 16px;
      padding: 40px 36px;
      background: #fff;
      box-shadow: 0 4px 24px rgba(0,0,0,.06);
    }

    .login-card-title {
      font-size: 26px;
      font-weight: 800;
      color: #0F172A;
      text-align: center;
      margin-bottom: 8px;
    }

    .login-card-sub {
      font-size: 13px;
      color: #94A3B8;
      text-align: center;
      margin-bottom: 28px;
      font-weight: 400;
      line-height: 1.6;
    }

    /* ── FORM FIELDS ── */
    .form-label {
      font-size: 13px;
      font-weight: 600;
      color: #334155;
      margin-bottom: 6px;
      display: block;
    }

    .form-input {
      width: 100%;
      height: 44px;
      border: 1.5px solid #E2E8F0;
      border-radius: 8px;
      padding: 0 14px;
      font-size: 14px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: #1E293B;
      background: #fff;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      margin-bottom: 20px;
    }

    .form-input:focus {
      border-color: #2563EB;
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }

    .form-input::placeholder { color: #CBD5E1; }

    /* Send Code Button */
    .btn-send {
      width: 100%;
      height: 44px;
      background: #2563EB;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Plus Jakarta Sans', sans-serif;
      cursor: pointer;
      transition: background .2s, transform .1s;
      letter-spacing: .3px;
    }

    .btn-send:hover { background: #1D4ED8; }
    .btn-send:active { transform: scale(.99); }

    /* ── SUCCESS STATE ── */
    .success-state {
      display: none;
      text-align: center;
      padding: 10px 0;
    }

    .success-icon {
      width: 60px;
      height: 60px;
      background: #D1FAE5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      color: #10B981;
      margin: 0 auto 16px;
    }

    .success-title {
      font-size: 18px;
      font-weight: 700;
      color: #0F172A;
      margin-bottom: 8px;
    }

    .success-sub {
      font-size: 13px;
      color: #94A3B8;
      line-height: 1.6;
      margin-bottom: 22px;
    }

    .btn-back-to-login {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 22px;
      background: #2563EB;
      color: #fff;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: background .2s;
    }

    .btn-back-to-login:hover { background: #1D4ED8; color: #fff; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .login-left { width: 38%; padding: 32px 28px; }
      .welcome-heading { font-size: 28px; }
    }

    @media (max-width: 680px) {
      .login-page { flex-direction: column; }

      .login-left {
        width: 100%;
        min-height: 220px;
        border-radius: 0 0 60px 60px;
        padding: 32px 24px;
      }

      .welcome-heading { font-size: 26px; }

      .login-right {
        padding: 40px 16px;
        align-items: flex-start;
      }

      .login-card {
        padding: 28px 22px;
        box-shadow: none;
        border: none;
      }
    }
  </style>
</head>
<body>

<div class="login-page">

  <!-- ── LEFT BLUE PANEL ── -->
  <div class="login-left">
    <div class="brand-block">
      <div class="brand-icon">
        <i class="bi bi-shop"></i>
      </div>
      <div>
        <div class="brand-text-name">Main Branch</div>
        <div class="brand-text-role">Administrator</div>
      </div>
    </div>
    <div class="welcome-heading">Welcome Back!</div>
    <a href="../login.html" class="btn-back-login">
      <i class="bi bi-arrow-left"></i> Login
    </a>
  </div>

  <!-- ── RIGHT WHITE PANEL ── -->
  <div class="login-right">
    <div class="login-card">

      <!-- ── FORM STATE ── -->
      <div id="formState">
        <div class="login-card-title">Reset password</div>
        <div class="login-card-sub">
          Enter your email address. We'll send a code<br>so you can reset your password.
        </div>

        <label class="form-label">Email Address</label>
        <input
          type="email"
          class="form-input"
          id="emailInput"
          placeholder="Please enter your email address"
          autocomplete="email"
        />

        <button class="btn-send" onclick="handleSendCode()">Send code</button>
      </div>

      <!-- ── SUCCESS STATE (shown after submit) ── -->
      <div class="success-state" id="successState">
        <div class="success-icon">
          <i class="bi bi-envelope-check-fill"></i>
        </div>
        <div class="success-title">Check your email!</div>
        <div class="success-sub">
          We've sent a password reset code to your email address. Please check your inbox.
        </div>
        <a href="../login.html" class="btn-back-to-login">
          <i class="bi bi-arrow-left"></i> Back to Login
        </a>
      </div>

    </div>
  </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  function handleSendCode() {
    const email = document.getElementById('emailInput').value.trim();

    if (!email) {
      document.getElementById('emailInput').style.borderColor = '#EF4444';
      document.getElementById('emailInput').focus();
      return;
    }

    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
      document.getElementById('emailInput').style.borderColor = '#EF4444';
      document.getElementById('emailInput').focus();
      return;
    }

    // Show success state
    document.getElementById('formState').style.display = 'none';
    document.getElementById('successState').style.display = 'block';
  }

  // Reset border on input
  document.getElementById('emailInput').addEventListener('input', function() {
    this.style.borderColor = '#E2E8F0';
  });

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSendCode();
  });
</script>

</body>
</html>
