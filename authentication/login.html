<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | POS System</title>

  <!-- Bootstrap 5 CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <!-- Google Fonts -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      margin: 0;
      padding: 0;
      background: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── FULL PAGE WRAPPER ── */
    .login-page {
      display: flex;
      width: 100vw;
      min-height: 100vh;
      position: relative;
    }

    /* ── LEFT PANEL (Blue) ── */
    .login-left {
      width: 42%;
      background: #2563EB;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 48px;
      position: relative;
      border-radius: 0 80px 80px 0;
      z-index: 2;
    }

    .brand-block {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }

    .brand-icon {
      width: 52px;
      height: 52px;
      background: rgba(255,255,255,.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #fff;
      flex-shrink: 0;
    }

    .brand-text-name {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      line-height: 1.1;
    }

    .brand-text-role {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,.65);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .welcome-heading {
      font-size: 38px;
      font-weight: 800;
      color: #fff;
      text-align: center;
      line-height: 1.2;
    }

    /* ── RIGHT PANEL (White) ── */
    .login-right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      background: #fff;
    }

    /* ── LOGIN CARD ── */
    .login-card {
      width: 100%;
      max-width: 360px;
      border: 1px solid #E2E8F0;
      border-radius: 16px;
      padding: 40px 36px;
      background: #fff;
      box-shadow: 0 4px 24px rgba(0,0,0,.06);
    }

    .login-card-title {
      font-size: 28px;
      font-weight: 800;
      color: #0F172A;
      text-align: center;
      margin-bottom: 4px;
    }

    .login-card-sub {
      font-size: 13px;
      color: #94A3B8;
      text-align: center;
      margin-bottom: 28px;
      font-weight: 400;
    }

    /* ── FORM FIELDS ── */
    .form-label {
      font-size: 13px;
      font-weight: 600;
      color: #334155;
      margin-bottom: 6px;
      display: block;
    }

    .input-group-custom {
      position: relative;
      margin-bottom: 18px;
    }

    .input-icon-left {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #94A3B8;
      font-size: 15px;
      pointer-events: none;
    }

    .input-icon-right {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #94A3B8;
      font-size: 15px;
      cursor: pointer;
      transition: color .2s;
      background: none;
      border: none;
      padding: 0;
      line-height: 1;
    }

    .input-icon-right:hover { color: #475569; }

    .form-input {
      width: 100%;
      height: 44px;
      border: 1.5px solid #E2E8F0;
      border-radius: 8px;
      padding: 0 40px 0 38px;
      font-size: 14px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: #1E293B;
      background: #fff;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    .form-input:focus {
      border-color: #2563EB;
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }

    .form-input::placeholder { color: #CBD5E1; }

    /* Forgot Password */
    .forgot-link {
      display: block;
      text-align: right;
      font-size: 12.5px;
      font-weight: 600;
      color: #2563EB;
      text-decoration: none;
      margin-top: -10px;
      margin-bottom: 22px;
      transition: color .2s;
    }

    .forgot-link:hover { color: #1D4ED8; text-decoration: underline; }

    /* Login Button */
    .btn-login {
      width: 100%;
      height: 44px;
      background: #2563EB;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Plus Jakarta Sans', sans-serif;
      cursor: pointer;
      transition: background .2s, transform .1s;
      letter-spacing: .3px;
    }

    .btn-login:hover { background: #1D4ED8; }
    .btn-login:active { transform: scale(.99); }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .login-left { width: 38%; padding: 32px 28px; }
      .welcome-heading { font-size: 28px; }
    }

    @media (max-width: 680px) {
      .login-page { flex-direction: column; }

      .login-left {
        width: 100%;
        min-height: 220px;
        border-radius: 0 0 60px 60px;
        padding: 32px 24px;
      }

      .welcome-heading { font-size: 26px; }

      .login-right {
        padding: 32px 16px 40px;
        align-items: flex-start;
        padding-top: 40px;
      }

      .login-card {
        padding: 28px 22px;
        box-shadow: none;
        border: none;
      }
    }

    @media (max-width: 380px) {
      .login-card { padding: 20px 14px; }
    }
  </style>
</head>
<body>

<div class="login-page">

  <!-- ── LEFT BLUE PANEL ── -->
  <div class="login-left">
    <div class="brand-block">
      <div class="brand-icon">
        <i class="bi bi-shop"></i>
      </div>
      <div>
        <div class="brand-text-name">Main Branch</div>
        <div class="brand-text-role">Administrator</div>
      </div>
    </div>
    <div class="welcome-heading">Welcome Back!</div>
  </div>

  <!-- ── RIGHT WHITE PANEL ── -->
  <div class="login-right">
    <div class="login-card">

      <div class="login-card-title">Login</div>
      <div class="login-card-sub">Let's login into your account first</div>

      <!-- Username -->
      <label class="form-label">User Name</label>
      <div class="input-group-custom">
        <i class="bi bi-person input-icon-left"></i>
        <input
          type="text"
          class="form-input"
          id="username"
          placeholder="Enter your username"
          autocomplete="username"
        />
      </div>

      <!-- Password -->
      <label class="form-label">Password</label>
      <div class="input-group-custom">
        <i class="bi bi-key input-icon-left"></i>
        <input
          type="password"
          class="form-input"
          id="password"
          placeholder="Enter your password"
          autocomplete="current-password"
        />
        <button class="input-icon-right" onclick="togglePassword()" id="eyeBtn" type="button">
          <i class="bi bi-eye-slash" id="eyeIcon"></i>
        </button>
      </div>

      <!-- Forgot Password -->
      <a href="#" class="forgot-link">Forgot Password ?</a>

      <!-- Submit -->
      <button class="btn-login" onclick="handleLogin()">Login</button>

    </div>
  </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // Toggle password visibility
  function togglePassword() {
    const input   = document.getElementById('password');
    const icon    = document.getElementById('eyeIcon');
    const isHidden = input.type === 'password';
    input.type  = isHidden ? 'text' : 'password';
    icon.className = isHidden ? 'bi bi-eye' : 'bi bi-eye-slash';
  }

  // Login handler
  function handleLogin() {
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value.trim();
    if (!user || !pass) {
      alert('Please enter both username and password.');
      return;
    }
    // Redirect to dashboard
    window.location.href = 'index.html';
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
</script>

</body>
</html>
