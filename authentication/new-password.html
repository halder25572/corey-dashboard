<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create New Password | POS System</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      margin: 0; padding: 0;
      background: #fff;
      min-height: 100vh;
      overflow: hidden;
    }

    .login-page {
      display: flex;
      width: 100vw;
      min-height: 100vh;
    }

    /* ── LEFT BLUE PANEL ── */
    .login-left {
      width: 42%;
      background: #2563EB;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 48px;
      border-radius: 0 80px 80px 0;
      z-index: 2;
    }

    .brand-block {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 36px;
    }
    .brand-icon {
      width: 52px; height: 52px;
      background: rgba(255,255,255,.2);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; color: #fff; flex-shrink: 0;
    }
    .brand-text-name { font-size: 22px; font-weight: 800; color: #fff; line-height: 1.1; }
    .brand-text-role {
      font-size: 11px; font-weight: 600; color: rgba(255,255,255,.65);
      letter-spacing: 1.2px; text-transform: uppercase; margin-top: 2px;
    }
    .welcome-heading {
      font-size: 38px; font-weight: 800; color: #fff;
      text-align: center; line-height: 1.2; margin-bottom: 28px;
    }
    .btn-left {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 24px;
      border: 1.5px solid rgba(255,255,255,.6);
      border-radius: 8px; color: #fff;
      font-size: 13px; font-weight: 600;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: transparent; cursor: pointer;
      text-decoration: none;
      transition: background .2s, border-color .2s;
    }
    .btn-left:hover { background: rgba(255,255,255,.15); border-color: #fff; color: #fff; }

    /* ── RIGHT PANEL ── */
    .login-right {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 40px 24px; background: #fff;
    }

    /* ── CARD ── */
    .login-card {
      width: 100%; max-width: 370px;
      border: 1px solid #E2E8F0;
      border-radius: 16px;
      padding: 38px 36px;
      background: #fff;
      box-shadow: 0 4px 24px rgba(0,0,0,.06);
    }

    .card-title {
      font-size: 24px; font-weight: 800; color: #0F172A;
      text-align: center; margin-bottom: 8px;
    }
    .card-sub {
      font-size: 13px; color: #94A3B8;
      text-align: center; margin-bottom: 26px;
      line-height: 1.6; font-weight: 400;
    }

    /* ── FORM ── */
    .form-label {
      font-size: 13px; font-weight: 600; color: #334155;
      margin-bottom: 6px; display: block;
    }

    .input-wrap {
      position: relative; margin-bottom: 16px;
    }

    .form-input {
      width: 100%; height: 44px;
      border: 1.5px solid #E2E8F0;
      border-radius: 8px;
      padding: 0 40px 0 14px;
      font-size: 14px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: #1E293B; background: #fff; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-input:focus {
      border-color: #2563EB;
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }
    .form-input::placeholder { color: #CBD5E1; }
    .form-input.error { border-color: #EF4444; }
    .form-input.success { border-color: #10B981; }

    .toggle-eye {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      color: #94A3B8; font-size: 15px;
      cursor: pointer; background: none; border: none; padding: 0; line-height: 1;
      transition: color .2s;
    }
    .toggle-eye:hover { color: #475569; }

    /* Password strength bar */
    .strength-bar {
      display: flex; gap: 4px; margin-top: -8px; margin-bottom: 14px;
    }
    .strength-seg {
      flex: 1; height: 3px; border-radius: 99px;
      background: #E2E8F0; transition: background .3s;
    }
    .strength-seg.weak   { background: #EF4444; }
    .strength-seg.medium { background: #F59E0B; }
    .strength-seg.strong { background: #10B981; }

    .strength-label {
      font-size: 11px; font-weight: 600; margin-bottom: 12px; margin-top: -10px;
    }
    .strength-label.weak   { color: #EF4444; }
    .strength-label.medium { color: #F59E0B; }
    .strength-label.strong { color: #10B981; }

    /* Field error text */
    .field-error {
      font-size: 11.5px; color: #EF4444; font-weight: 500;
      margin-top: -10px; margin-bottom: 10px; display: none;
    }

    /* ── BUTTON ── */
    .btn-save {
      width: 100%; height: 44px;
      background: #2563EB; color: #fff; border: none;
      border-radius: 8px; font-size: 14px; font-weight: 700;
      font-family: 'Plus Jakarta Sans', sans-serif;
      cursor: pointer; transition: background .2s, transform .1s;
      margin-top: 6px;
    }
    .btn-save:hover { background: #1D4ED8; }
    .btn-save:active { transform: scale(.99); }

    /* ── SUCCESS OVERLAY ── */
    .success-state { display: none; text-align: center; padding: 10px 0; }
    .success-icon {
      width: 64px; height: 64px;
      background: #D1FAE5; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; color: #10B981; margin: 0 auto 16px;
    }
    .success-title { font-size: 20px; font-weight: 800; color: #0F172A; margin-bottom: 8px; }
    .success-sub { font-size: 13px; color: #94A3B8; margin-bottom: 22px; line-height: 1.6; }
    .btn-go-login {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 24px; background: #2563EB; color: #fff;
      border-radius: 8px; font-size: 13px; font-weight: 600;
      text-decoration: none; transition: background .2s;
    }
    .btn-go-login:hover { background: #1D4ED8; color: #fff; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .login-left { width: 38%; padding: 32px 28px; }
      .welcome-heading { font-size: 28px; }
    }
    @media (max-width: 680px) {
      .login-page { flex-direction: column; }
      .login-left {
        width: 100%; min-height: 220px;
        border-radius: 0 0 60px 60px; padding: 32px 24px;
      }
      .welcome-heading { font-size: 26px; }
      .login-right { padding: 40px 16px; align-items: flex-start; }
      .login-card { padding: 28px 20px; box-shadow: none; border: none; }
    }
  </style>
</head>
<body>

<div class="login-page">

  <!-- ── LEFT BLUE PANEL ── -->
  <div class="login-left">
    <div class="brand-block">
      <div class="brand-icon"><i class="bi bi-shop"></i></div>
      <div>
        <div class="brand-text-name">Main Branch</div>
        <div class="brand-text-role">Administrator</div>
      </div>
    </div>
    <div class="welcome-heading">Welcome Back!</div>
    <a href="login.html" class="btn-left">
      <i class="bi bi-arrow-left"></i> Login
    </a>
  </div>

  <!-- ── RIGHT WHITE PANEL ── -->
  <div class="login-right">
    <div class="login-card">

      <!-- FORM STATE -->
      <div id="formState">
        <div class="card-title">Create new password</div>
        <div class="card-sub">Choose something only you would know.<br>Avoid reusing old passwords.</div>

        <!-- User Name -->
        <label class="form-label">User Name</label>
        <div class="input-wrap">
          <input type="text" class="form-input" id="username" placeholder="Enter your username" autocomplete="username" />
        </div>

        <!-- New Password -->
        <label class="form-label">New Password</label>
        <div class="input-wrap">
          <input type="password" class="form-input" id="newPass" placeholder="••••••••" autocomplete="new-password" oninput="checkStrength()" />
          <button class="toggle-eye" type="button" onclick="togglePass('newPass', 'eye1')">
            <i class="bi bi-eye-slash" id="eye1"></i>
          </button>
        </div>
        <!-- Strength bar -->
        <div class="strength-bar" id="strengthBar">
          <div class="strength-seg" id="seg1"></div>
          <div class="strength-seg" id="seg2"></div>
          <div class="strength-seg" id="seg3"></div>
          <div class="strength-seg" id="seg4"></div>
        </div>
        <div class="strength-label" id="strengthLabel"></div>

        <!-- Confirm Password -->
        <label class="form-label">Confirm New Password</label>
        <div class="input-wrap">
          <input type="password" class="form-input" id="confirmPass" placeholder="••••••••" autocomplete="new-password" />
          <button class="toggle-eye" type="button" onclick="togglePass('confirmPass', 'eye2')">
            <i class="bi bi-eye-slash" id="eye2"></i>
          </button>
        </div>
        <div class="field-error" id="matchError">
          <i class="bi bi-exclamation-circle me-1"></i>Passwords do not match.
        </div>

        <button class="btn-save" onclick="handleSave()">Save and continue</button>
      </div>

      <!-- SUCCESS STATE -->
      <div class="success-state" id="successState">
        <div class="success-icon"><i class="bi bi-check-lg"></i></div>
        <div class="success-title">Password Updated!</div>
        <div class="success-sub">Your password has been reset successfully.<br>You can now log in with your new password.</div>
        <a href="login.html" class="btn-go-login">
          <i class="bi bi-box-arrow-in-right"></i> Go to Login
        </a>
      </div>

    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  /* ── Toggle password visibility ── */
  function togglePass(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon  = document.getElementById(iconId);
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    icon.className = isHidden ? 'bi bi-eye' : 'bi bi-eye-slash';
  }

  /* ── Password strength checker ── */
  function checkStrength() {
    const val = document.getElementById('newPass').value;
    const segs  = [document.getElementById('seg1'), document.getElementById('seg2'),
                   document.getElementById('seg3'), document.getElementById('seg4')];
    const label = document.getElementById('strengthLabel');

    segs.forEach(s => s.className = 'strength-seg');
    label.textContent = '';
    label.className = 'strength-label';

    if (!val) return;

    let score = 0;
    if (val.length >= 6)               score++;
    if (val.length >= 10)              score++;
    if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
    if (/[0-9]/.test(val))             score++;
    if (/[^A-Za-z0-9]/.test(val))      score++;

    if (score <= 2) {
      segs[0].classList.add('weak');
      label.textContent = 'Weak'; label.classList.add('weak');
    } else if (score <= 3) {
      segs[0].classList.add('medium'); segs[1].classList.add('medium');
      label.textContent = 'Fair'; label.classList.add('medium');
    } else if (score === 4) {
      segs[0].classList.add('strong'); segs[1].classList.add('strong'); segs[2].classList.add('strong');
      label.textContent = 'Good'; label.classList.add('strong');
    } else {
      segs.forEach(s => s.classList.add('strong'));
      label.textContent = 'Strong'; label.classList.add('strong');
    }
  }

  /* ── Save handler ── */
  function handleSave() {
    const username = document.getElementById('username').value.trim();
    const newPass  = document.getElementById('newPass').value;
    const confirm  = document.getElementById('confirmPass').value;
    const matchErr = document.getElementById('matchError');

    let valid = true;

    // Username check
    const uInput = document.getElementById('username');
    if (!username) {
      uInput.classList.add('error'); valid = false;
    } else {
      uInput.classList.remove('error');
    }

    // Password check
    const pInput = document.getElementById('newPass');
    if (newPass.length < 6) {
      pInput.classList.add('error'); valid = false;
    } else {
      pInput.classList.remove('error');
    }

    // Confirm match
    const cInput = document.getElementById('confirmPass');
    if (newPass !== confirm) {
      cInput.classList.add('error');
      matchErr.style.display = 'block';
      valid = false;
    } else {
      cInput.classList.remove('error');
      matchErr.style.display = 'none';
    }

    if (!valid) return;

    // Show success
    document.getElementById('formState').style.display = 'none';
    document.getElementById('successState').style.display = 'block';
  }

  /* ── Clear errors on input ── */
  ['username','newPass','confirmPass'].forEach(id => {
    document.getElementById(id).addEventListener('input', function() {
      this.classList.remove('error');
      document.getElementById('matchError').style.display = 'none';
    });
  });

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSave(); });
</script>

</body>
</html>
