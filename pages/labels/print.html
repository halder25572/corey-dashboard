<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Print Labels | POS System</title>

  <!-- Bootstrap 5 CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="../../assets/css/style.css" />

  <style>
    .print-page-wrapper {
      padding: 40px;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }
    .print-container {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 800px;
    }
    .print-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    .label-box {
      position: relative;
      background: #fffef2; /* Slightly yellowish as per screenshot */
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      overflow: hidden;
      aspect-ratio: 2.5 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }
    .label-bg-logo {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.3; /* Faded background logo */
      z-index: 1;
    }
    .label-text-content {
      position: relative;
      z-index: 2;
      text-align: center;
    }
    .label-item-name {
      font-size: 13px;
      font-weight: 700;
      color: #000;
      text-transform: uppercase;
      margin-bottom: 2px;
      line-height: 1.2;
    }
    .label-item-price {
      font-size: 14px;
      font-weight: 800;
      color: #000;
    }

    @media print {
      body { background: none; }
      .print-page-wrapper { padding: 0; background: none; }
      .print-container { box-shadow: none; padding: 0; max-width: none; }
      .no-print { display: none; }
    }
    
    .top-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .btn-print-now {
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 10px 24px;
      font-weight: 600;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<div class="print-page-wrapper">
  <div class="print-container">
    
    <div class="top-actions no-print">
      <h5 class="mb-0">Print Preview</h5>
      <button class="btn-print-now" onclick="window.print()"><i class="bi bi-printer"></i> Print Now</button>
    </div>

    <div class="print-grid">
      <!-- Row 1 -->
      <div class="label-box">
        <img src="../../assets/images/logo.png" class="label-bg-logo" alt="Logo">
        <div class="label-text-content">
          <div class="label-item-name">COKE LIGHT 20oz</div>
          <div class="label-item-price">$3.50</div>
        </div>
      </div>
      <div class="label-box">
        <img src="../../assets/images/logo.png" class="label-bg-logo" alt="Logo">
        <div class="label-text-content">
          <div class="label-item-name">SPRITE REGULAR 2L</div>
          <div class="label-item-price">$9.95</div>
        </div>
      </div>

      <!-- Row 2 -->
      <div class="label-box">
        <img src="../../assets/images/logo.png" class="label-bg-logo" alt="Logo">
        <div class="label-text-content">
          <div class="label-item-name">FANTA 20oz</div>
          <div class="label-item-price">$3.50</div>
        </div>
      </div>
      <div class="label-box">
        <img src="../../assets/images/logo.png" class="label-bg-logo" alt="Logo">
        <div class="label-text-content">
          <div class="label-item-name">MONSTER ENERGY DRINK 473ml</div>
          <div class="label-item-price">$7.50</div>
        </div>
      </div>

      <!-- Row 3 (Empty placeholders) -->
      <div class="label-box"><img src="../../assets/images/logo.png" class="label-bg-logo" alt="Logo"></div>
      <div class="label-box"><img src="../../assets/images/logo.png" class="label-bg-logo" alt="Logo"></div>
      
      <!-- Row 4 -->
      <div class="label-box"><img src="../../assets/images/logo.png" class="label-bg-logo" alt="Logo"></div>
      <div class="label-box"><img src="../../assets/images/logo.png" class="label-bg-logo" alt="Logo"></div>

      <!-- Row 5 -->
      <div class="label-box"><img src="../../assets/images/logo.png" class="label-bg-logo" alt="Logo"></div>
      <div class="label-box"><img src="../../assets/images/logo.png" class="label-bg-logo" alt="Logo"></div>

      <!-- Row 6 -->
      <div class="label-box"><img src="../../assets/images/logo.png" class="label-bg-logo" alt="Logo"></div>
      <div class="label-box"><img src="../../assets/images/logo.png" class="label-bg-logo" alt="Logo"></div>

      <!-- Row 7 -->
      <div class="label-box"><img src="../../assets/images/logo.png" class="label-bg-logo" alt="Logo"></div>
      <div class="label-box"><img src="../../assets/images/logo.png" class="label-bg-logo" alt="Logo"></div>

      <!-- Row 8 -->
      <div class="label-box"><img src="../../assets/images/logo.png" class="label-bg-logo" alt="Logo"></div>
      <div class="label-box"><img src="../../assets/images/logo.png" class="label-bg-logo" alt="Logo"></div>

      <!-- Row 9 -->
      <div class="label-box"><img src="../../assets/images/logo.png" class="label-bg-logo" alt="Logo"></div>
      <div class="label-box"><img src="../../assets/images/logo.png" class="label-bg-logo" alt="Logo"></div>
    </div>

  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const savedLogo = localStorage.getItem('labelBackgroundLogo');
    if (savedLogo) {
      const logoImages = document.querySelectorAll('.label-bg-logo');
      logoImages.forEach(img => {
        img.src = savedLogo;
      });
    }
  });
</script>
</body>
</html>
